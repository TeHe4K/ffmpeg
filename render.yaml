services:
  - type: web
    name: customsongs-converter
    env: docker
    plan: free
    autoDeploy: false
    envVars:
      - key: CUSTOMSONGS_CONVERTER_KEY
        generateValue: true
      - key: MAX_DURATION_SECONDS
        value: "600"
      - key: MAX_DOWNLOAD_BYTES
        value: "125829120"
      - key: MAX_OGG_BYTES
        value: "33554432"
      - key: PROCESS_TIMEOUT_SECONDS
        value: "600"
    healthCheckPath: /health
